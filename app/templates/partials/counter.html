<!-- Counter partial — returned by htmx POST /api/counter/increment -->
<div id="counter-widget">
  <div class="counter-display">
    <span class="counter-value">{{ counter.value }}</span>
    <span class="counter-label">clicks</span>
  </div>

  <div class="counter-actions">
    <!-- htmx: POST /api/counter/increment, replace #counter-widget with response -->
    <button
      class="btn btn-primary"
      hx-post="/api/counter/increment"
      hx-target="#counter-widget"
      hx-swap="outerHTML"
    >
      ➕ Increment
    </button>

    <!-- htmx: POST /api/counter/reset -->
    <button
      class="btn btn-outline btn-danger"
      hx-post="/api/counter/reset"
      hx-target="#counter-widget"
      hx-swap="outerHTML"
      hx-confirm="Reset the counter to zero?"
    >
      ↺ Reset
    </button>
  </div>

  <p class="counter-meta text-muted">
    Last updated: {{ counter.updated_at.strftime("%Y-%m-%d %H:%M:%S UTC") if counter.updated_at else "—" }}
  </p>
</div>
