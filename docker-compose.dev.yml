# Docker development environment — Python FastAPI app
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# For local Docker (same machine), uncomment the volume mounts below
# to enable hot-reload. For remote Docker contexts (SSH), leave them
# commented out — the code is baked into the image at build time.
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app.dev
    environment:
      DATABASE_URL: sqlite:////app/data/dev.db
      DEPLOYMENT: development
      DEBUG: "true"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - appdata:/app/data
    # Uncomment for local Docker with hot-reload:
    # volumes:
    #   - ./app:/app/app
    #   - ./alembic:/app/alembic
    #   - appdata:/app/data

volumes:
  appdata:
